services:
  - type: web
    name: rondapix-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    repo: https://github.com/k2publicidade/rondapix.git
    branch: master
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: rondapix-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://rondapix.vercel.app
      - key: HOUSE_EDGE
        value: "0.05"
      - key: MIN_BET
        value: "10"
      - key: MAX_BET
        value: "10000"
      - key: BETTING_WINDOW_SECONDS
        value: "30"
      - key: REVEAL_INTERVAL_MS
        value: "800"
      - key: MASTER_SERVER_SEED
        generateValue: true

databases:
  - name: rondapix-db
    plan: free
    databaseName: rondapix
    user: rondapix
