version: '3.9'

services:
  # ----------------------------------------------------------------
  # PostgreSQL
  # ----------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ronda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ronda
      POSTGRES_PASSWORD: ronda
      POSTGRES_DB: ronda_online
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ronda -d ronda_online']
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------
  # Redis
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ronda-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # ----------------------------------------------------------------
  # Redis Commander (UI para Redis em desenvolvimento)
  # ----------------------------------------------------------------
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: ronda-redis-ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - '8081:8081'
    depends_on:
      - redis
    profiles:
      - dev-tools

  # ----------------------------------------------------------------
  # Adminer (UI para PostgreSQL em desenvolvimento)
  # ----------------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: ronda-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - postgres
    profiles:
      - dev-tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: ronda-network
